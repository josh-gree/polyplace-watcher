name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-watcher
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      WATCHER_HOST: polyplace-watcher.fly.dev
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        id: deploy
        run: flyctl deploy --remote-only --build-arg GIT_SHA="$DEPLOY_SHA"

      - name: Smoke checks
        id: smoke
        run: |
          set -euo pipefail

          echo "::group::GET /health (waiting for deploy sha $DEPLOY_SHA)"
          health=$(mktemp)
          deadline=$((SECONDS + 120))
          actual="(none)"
          while [ $SECONDS -lt $deadline ]; do
            if curl --fail --silent --show-error --max-time 10 \
                    -o "$health" "https://${WATCHER_HOST}/health" 2>/dev/null; then
              actual=$(jq -r '.git_sha // "unknown"' "$health" 2>/dev/null || echo "unparseable")
              if [ "$actual" = "$DEPLOY_SHA" ]; then
                echo "served sha matches deploy: $actual"
                break
              fi
              echo "served sha is $actual, waiting for $DEPLOY_SHA"
            else
              echo "/health not yet reachable, retrying"
            fi
            sleep 5
          done
          if [ "$actual" != "$DEPLOY_SHA" ]; then
            echo "::error::/health did not report deploy sha $DEPLOY_SHA within 120s (last seen: $actual)"
            cat "$health" 2>/dev/null || true
            exit 1
          fi
          cat "$health"
          echo
          jq -e 'has("last_block") and has("last_log_index")' "$health" > /dev/null
          echo "::endgroup::"

          echo "::group::GET /grid"
          grid=$(mktemp)
          headers=$(mktemp)
          curl --fail \
               --silent \
               --show-error \
               --max-time 30 \
               --retry 5 \
               --retry-delay 5 \
               --retry-all-errors \
               -D "$headers" \
               -o "$grid" \
               "https://${WATCHER_HOST}/grid"
          size=$(stat -c%s "$grid")
          echo "grid bytes: $size"
          if [ "$size" -le 0 ]; then
            echo "::error::/grid returned empty body"
            exit 1
          fi
          if ! grep -qi '^content-type:.*application/octet-stream' "$headers"; then
            echo "::error::/grid returned wrong content-type"
            grep -i '^content-type' "$headers" || true
            exit 1
          fi
          echo "::endgroup::"

      - name: Rollback on smoke failure
        if: failure() && steps.deploy.outcome == 'success' && steps.smoke.outcome == 'failure'
        run: |
          echo "::warning::Smoke checks failed after a successful deploy — rolling back to the previous release"
          flyctl releases rollback -y
