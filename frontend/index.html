<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polyplace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #888;
    }

    canvas {
      display: block;
      width: 100vmin;
      height: 100vmin;
      image-rendering: pixelated;
    }

    #status {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="grid" width="1000" height="1000"></canvas>
  <div id="status">Connecting…</div>

  <script>
    const MAGIC = [0x50, 0x4C, 0x47, 0x01]; // PLG\x01

    const canvas = document.getElementById('grid');
    const ctx    = canvas.getContext('2d');
    const status = document.getElementById('status');

    async function decompress(buf) {
      const ds     = new DecompressionStream('gzip');
      const writer = ds.writable.getWriter();
      writer.write(buf);
      writer.close();
      return new Response(ds.readable).arrayBuffer();
    }

    async function applySnapshot(buf) {
      buf = await decompress(buf);
      const data = new Uint8Array(buf);
      const view = new DataView(buf);

      for (let i = 0; i < 4; i++) {
        if (data[i] !== MAGIC[i]) throw new Error('Bad magic bytes');
      }

      const width      = view.getUint16(4,  true);
      const height     = view.getUint16(6,  true);
      const nRenderers = view.getUint32(8,  true);
      let pos = 20 + nRenderers * 20; // skip header + address table

      const totalCells = width * height;
      const bitmapSize = Math.ceil(totalCells / 8);
      const bitmapStart = pos;
      pos += bitmapSize;
      const rgbStart = pos;

      const imgData = ctx.createImageData(width, height);
      const px = imgData.data;

      for (let i = 0; i < totalCells * 4; i += 4) {
        px[i] = px[i + 1] = px[i + 2] = 30;
        px[i + 3] = 255;
      }

      let rgbPos = rgbStart;
      for (let cellId = 0; cellId < totalCells; cellId++) {
        if (data[bitmapStart + (cellId >> 3)] & (1 << (cellId & 7))) {
          const off = cellId * 4;
          px[off]     = data[rgbPos];
          px[off + 1] = data[rgbPos + 1];
          px[off + 2] = data[rgbPos + 2];
          rgbPos += 3;
        }
      }

      ctx.putImageData(imgData, 0, 0);
    }

    function applyUpdate(msg) {
      const { i, r, g, b } = JSON.parse(msg);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(i % 1000, Math.floor(i / 1000), 1, 1);
    }

    let initialized = false;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws    = new WebSocket(`${proto}//${location.host}/ws`);
      ws.binaryType = 'arraybuffer';
      ws.onmessage = async (event) => {
        try {
          if (event.data instanceof ArrayBuffer) {
            await applySnapshot(event.data);
            initialized = true;
            status.textContent = '';
          } else {
            applyUpdate(event.data);
          }
        } catch (err) {
          status.textContent = `Error: ${err.message}`;
          console.error(err);
        }
      };

      ws.onerror = () => {
        status.textContent = 'Connection error — refresh to retry';
      };

      ws.onclose = () => {
        if (initialized) status.textContent = 'Disconnected — refresh to reconnect';
        else status.textContent = 'Could not connect — refresh to retry';
      };
    }

    connect();
  </script>
</body>
</html>
