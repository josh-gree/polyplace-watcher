services:

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - --host=0.0.0.0
      - --port=8545
      - --block-time=2
      # The paint service stress-tests the chain with up to 1M transactions.
      # Give dev accounts effectively unlimited local ETH for gas.
      - --balance=1000000000000
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://127.0.0.1:8545"]
      interval: 1s
      timeout: 3s
      retries: 15
      start_period: 2s

  watcher:
    build: .
    command: ["uv", "run", "uvicorn", "polyplace_watcher.app:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .local/watcher.env
    ports:
      - "8000:8000"
    depends_on:
      anvil:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
