services:

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - --host=0.0.0.0
      - --port=8545
      - --block-time=2
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://127.0.0.1:8545"]
      interval: 1s
      timeout: 3s
      retries: 15
      start_period: 2s

  watcher:
    build: .
    command: ["uv", "run", "uvicorn", "polyplace_watcher.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      WEB3_HTTP_URL: http://anvil:8545
      WEB3_WS_URL: ws://anvil:8545
      START_BLOCK: "0"
      # These addresses are deterministic: deployer 0xf39F... deploys at nonces 0, 1, 2
      # on a fresh anvil chain with the default mnemonic.
      TOKEN_ADDRESS:  "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      FAUCET_ADDRESS: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      GRID_ADDRESS:   "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
    ports:
      - "8000:8000"
    depends_on:
      anvil:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/grid')\""]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  paint:
    build: .
    # Deploy contracts first, then paint — sequential in one container avoids
    # nonce races that occur when deploy and paint run as separate services.
    command: ["sh", "-c", "uv run python scripts/deploy_local.py && uv run python scripts/paint_random.py"]
    environment:
      WEB3_HTTP_URL: http://anvil:8545
      GRID_ADDRESS:   "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
      TOKEN_ADDRESS:  "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      FAUCET_ADDRESS: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
    depends_on:
      watcher:
        condition: service_healthy
    restart: "no"
